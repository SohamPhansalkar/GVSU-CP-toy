<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Controllers - PlayAble</title>
    <link
      rel="icon"
      type="image/png"
      href="../../Media/Symbolic-logo-removebg.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body class="home-page">
    <nav class="navbar navbar-expand-lg nav-professional fixed-top">
      <div class="container">
        <a
          class="navbar-brand brand-lockup"
          href="home.html"
          aria-label="PlayAble Home"
        >
          <img
            src="../../Media/Symbolic-logo-removebg.png"
            alt="PlayAble symbol"
            class="brand-symbol"
          />
          <span class="brand-text">PlayAble</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <div
            class="user-greeting fw-bold px-3 py-2 rounded-pill"
            id="user-name"
          >
            👋 Hi, User!
          </div>
        </div>
      </div>
    </nav>

    <main
      class="container game-library-section d-flex justify-content-center align-items-center fade-in"
    >
      <div class="controller-card p-4 p-md-5 w-100">
        <div class="text-center mb-4">
          <h1 class="fw-bold text-dark mb-2">Device Management</h1>
          <p class="text-muted">
            Link your physical toy controller to your PlayAble account.
          </p>
        </div>

        <form id="controllerForm" novalidate>
          <div class="mb-4">
            <label for="controllerCode" class="form-label fw-medium text-dark"
              >Controller Code</label
            >
            <input
              type="text"
              class="form-control auth-input custom-input-lg"
              id="controllerCode"
              placeholder="e.g., C132"
              required
            />
            <div class="invalid-feedback">
              Please enter a valid controller code.
            </div>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-3">
            <button
              type="button"
              id="btnAddController"
              class="btn btn-success flex-grow-1 py-3 fw-semibold shadow-sm"
              onclick="btnAddControllerClicked()"
            >
              Add Controller
            </button>
            <button
              type="button"
              id="btnConvertController"
              class="btn btn-outline-success flex-grow-1 py-3 fw-semibold"
              onclick="redirectToVirtualController()"
            >
              Convert to Controller
            </button>
          </div>
        </form>

        <div id="controllerStatus" class="mt-4 text-center d-none"></div>
      </div>
    </main>

    <footer class="footer pt-5 pb-4 mt-auto">
      <div class="container text-center">
        <p class="text-dark small mb-1 fw-bold">Developer: Soham Phansalkar</p>
        <p class="text-muted small mb-3">
          This project is developed for Global Summer Engineering Program by
          GVSU
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="home.js"></script>
  </body>
</html>
