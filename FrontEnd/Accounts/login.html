<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - PlayAble</title>
    <link
      rel="icon"
      type="image/png"
      href="../../Media/Symbolic-logo-removebg.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="L-S.css" />
  </head>
  <body class="auth-page">
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center py-5"
    >
      <div class="auth-card fade-in">
        <div class="text-center mb-4">
          <a href="index.html" class="text-decoration-none d-inline-block">
            <h2 class="brand-text h3 mb-0">
              <img
                src="../../Media/Symbolic-logo-removebg.png"
                alt="PlayAble"
                height="170px"
                width="240px"
              />
            </h2>
          </a>
          <p class="text-muted small mt-2">
            Welcome back! Please login to your account.
          </p>
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label fw-medium text-dark"
              >Email address</label
            >
            <input
              type="email"
              class="form-control auth-input"
              id="email"
              placeholder="name@example.com"
              required
            />
            <div class="invalid-feedback">
              Please enter a valid email address.
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-medium text-dark"
              >Password</label
            >
            <input
              type="password"
              class="form-control auth-input"
              id="password"
              placeholder=""
              required
            />
            <div class="invalid-feedback">Please enter your password.</div>
          </div>

          <a href="../Home/home.html"
            ><button
              type="submit"
              class="btn btn-success w-100 py-2 fw-semibold mb-3 shadow-sm"
            >
              Login
            </button></a
          >

          <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a
              href="signup.html"
              class="text-success text-decoration-none fw-semibold"
              >Sign up</a
            >
          </p>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="L-S.js"></script>
  </body>
</html>
