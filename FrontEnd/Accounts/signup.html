<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up - PlayAble</title>
    <link
      rel="icon"
      type="image/png"
      href="../../Media/Symbolic-logo-removebg.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="L-S.css" />
  </head>
  <body class="auth-page">
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center py-5"
    >
      <div class="auth-card fade-in">
        <div class="text-center mb-4">
            <h2 class="brand-text h3 mb-0"><img src="../../Media/Symbolic-logo-removebg.png" alt="PlayAble" height="170px" width="240px"></h2>
          </a>
          <p class="text-muted small mt-2">
            Create an account to start your journey.
          </p>
        </div>

        <form id="signupForm" novalidate>
          <div class="mb-3">
            <label for="fullName" class="form-label fw-medium text-dark"
              >Full Name</label
            >
            <input
              type="text"
              class="form-control auth-input"
              id="fullName"
              placeholder=""
              required
            />
            <div class="invalid-feedback">Please enter your name.</div>
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <label for="age" class="form-label fw-medium text-dark"
                >Age</label
              >
              <input
                type="number"
                class="form-control auth-input"
                id="age"
                placeholder=""
                min="1"
                max="100"
                required
              />
              <div class="invalid-feedback">Please enter a valid age.</div>
            </div>
            <div class="col-6">
              <label for="gender" class="form-label fw-medium text-dark"
                >Gender</label
              >
              <select class="form-select auth-input" id="gender" required>
                <option value="" disabled selected>Select...</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer-not">Prefer not to say</option>
              </select>
              <div class="invalid-feedback">Please select a gender.</div>
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-medium text-dark"
              >Email address</label
            >
            <input
              type="email"
              class="form-control auth-input"
              id="email"
              placeholder="name@example.com"
              required
            />
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-medium text-dark"
              >Password</label
            >
            <input
              type="password"
              class="form-control auth-input"
              id="password"
              placeholder=""
              minlength="8"
              required
            />
            <div class="invalid-feedback">
              Password must be at least 8 characters.
            </div>
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label fw-medium text-dark"
              >Confirm Password</label
            >
            <input
              type="password"
              class="form-control auth-input"
              id="confirmPassword"
              placeholder=""
              required
            />
            <div class="invalid-feedback" id="passwordMatchError">
              Passwords do not match.
            </div>
          </div>

          <a href="../Home/home.html"><button
            type="submit"
            class="btn btn-success w-100 py-2 fw-semibold mb-3 shadow-sm"
          >
            Create Account
          </button></a>

          <p class="text-center text-muted small mb-0">
            Already have an account?
            <a
              href="login.html"
              class="text-success text-decoration-none fw-semibold"
              >Login here</a
            >
          </p>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="L-S.js"></script>
  </body>
</html>
