<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Virtual Controller - PlayAble</title>
    <link
      rel="icon"
      type="image/png"
      href="../../Media/Symbolic-logo-removebg.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="controller.css" />
  </head>
  <body class="controller-body">
    <div class="controller-header">
      <a href="../Home/home.html" class="back-link">← Back to Home</a>
      <span class="status-indicator" id="connectionStatus">🟢 Connected</span>
    </div>

    <main class="controller-container">
      <button id="btnLeft" class="ctrl-btn btn-side">LEFT</button>
      <button id="btnSelect" class="ctrl-btn btn-center">SELECT</button>
      <button id="btnRight" class="ctrl-btn btn-side">RIGHT</button>
    </main>

    <script src="controller.js"></script>
  </body>
</html>
