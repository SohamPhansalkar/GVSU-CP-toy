<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guess the Animal - PlayAble</title>
    <link
      rel="icon"
      type="image/png"
      href="../../../Media/Symbolic-logo-removebg.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="GTA.css" />
  </head>
  <body class="game-page">
    <nav class="navbar navbar-expand-lg nav-professional fixed-top">
      <div class="container">
        <a
          class="navbar-brand brand-lockup"
          href="../../Home/home.html"
          aria-label="PlayAble Home"
        >
          <img
            src="../../../Media/Symbolic-logo-removebg.png"
            alt="PlayAble symbol"
            class="brand-symbol"
          />
          <span class="brand-text">PlayAble</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <div
            class="user-greeting fw-bold px-3 py-2 rounded-pill"
            id="user-name"
          >
            👋 Hi, User!
          </div>
        </div>
      </div>
    </nav>

    <main
      class="container game-container d-flex justify-content-center align-items-center flex-column fade-in"
    >
      <div class="quiz-card w-100 p-4 p-md-5">
        <div
          class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3"
        >
          <h2 class="h4 fw-bold text-dark mb-0">Guess the Animal</h2>
          <span
            id="question-tracker"
            class="badge bg-success fs-6 rounded-pill px-3 py-2"
            >Question 1 / 5</span
          >
        </div>

        <div class="image-wrapper mb-4 text-center">
          <img
            id="animal-image"
            src=""
            alt="Guess this animal"
            class="img-fluid rounded-4 shadow-sm animal-pic"
          />
        </div>

        <div class="row g-3" id="options-grid">
          <div class="col-6">
            <button
              class="btn option-btn w-100 py-3 fw-bold fs-5"
              onclick="checkAnswer(0)"
              id="btn-0"
            >
              Option 1
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn option-btn w-100 py-3 fw-bold fs-5"
              onclick="checkAnswer(1)"
              id="btn-1"
            >
              Option 2
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn option-btn w-100 py-3 fw-bold fs-5"
              onclick="checkAnswer(2)"
              id="btn-2"
            >
              Option 3
            </button>
          </div>
          <div class="col-6">
            <button
              class="btn option-btn w-100 py-3 fw-bold fs-5"
              onclick="checkAnswer(3)"
              id="btn-3"
            >
              Option 4
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer pt-4 pb-3 mt-auto">
      <div class="container text-center">
        <p class="text-dark small mb-1 fw-bold">Developer: Soham Phansalkar</p>
        <p class="text-muted small mb-0">
          This project is developed for Global Summer Engineering Program by
          GVSU
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="GTA.js"></script>
  </body>
</html>
