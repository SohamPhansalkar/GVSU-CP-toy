<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Score - PlayAble</title>
    <link
      rel="icon"
      type="image/png"
      href="../../../Media/Symbolic-logo-removebg.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="GTA.css" />
  </head>
  <body class="game-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg nav-professional fixed-top">
      <div class="container">
        <a
          class="navbar-brand brand-lockup"
          href="home.html"
          aria-label="PlayAble Home"
        >
          <img
            src="../../../Media/Symbolic-logo-removebg.png"
            alt="PlayAble symbol"
            class="brand-symbol"
          />
          <span class="brand-text">PlayAble</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <div class="user-greeting fw-bold px-3 py-2 rounded-pill">
            👋 Hi, User!
          </div>
        </div>
      </div>
    </nav>

    <!-- Score Section -->
    <main
      class="container game-container d-flex justify-content-center align-items-center flex-column fade-in"
    >
      <div class="quiz-card text-center w-100 p-5">
        <div class="mb-4">
          <span class="display-1">🎉</span>
        </div>
        <h1 class="fw-bold text-dark mb-2">Great Job!</h1>
        <p class="text-muted fs-5 mb-4">You completed "Guess the Animal"</p>

        <div class="p-4 bg-light rounded-4 mb-4 border">
          <h2 class="display-4 fw-bold text-success mb-0">
            <span id="final-score">0</span> / <span id="total-score">5</span>
          </h2>
        </div>

        <div
          class="d-flex flex-column flex-sm-row justify-content-center gap-3"
        >
          <a
            href="GTA.html"
            class="btn btn-success btn-lg px-4 py-2 fw-semibold shadow-sm"
            >Play Again</a
          >
          <a
            href="../../Home/home.html"
            class="btn btn-outline-success btn-lg px-4 py-2 fw-semibold"
            >Back to Home</a
          >
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer pt-4 pb-3 mt-auto">
      <div class="container text-center">
        <p class="text-dark small mb-1 fw-bold">Developer: Soham Phansalkar</p>
        <p class="text-muted small mb-0">
          This project is developed for Global Summer Engineering Program by
          GVSU
        </p>
      </div>
    </footer>

    <!-- Inline JS to fetch and display the score -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const score = localStorage.getItem("gta_score") || 0;
        const total = localStorage.getItem("gta_total") || 5;

        document.getElementById("final-score").innerText = score;
        document.getElementById("total-score").innerText = total;
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../check.js"></script>
  </body>
</html>
